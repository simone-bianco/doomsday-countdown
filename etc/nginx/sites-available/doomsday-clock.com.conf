server {
    listen 80;
    listen [::]:80;

    server_name doomsday-clock.com www.doomsday-clock.com;

    root /var/www/doomsday-clock/public;
    index index.php index.html;

    charset utf-8;
    client_max_body_size 50M;

    access_log /var/log/nginx/doomsday-clock-access.log;
    error_log /var/log/nginx/doomsday-clock-error.log;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
    }

    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    location = /robots.txt {
        access_log off;
        log_not_found off;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
