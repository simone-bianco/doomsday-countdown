server {
    listen 80;
    listen [::]:80;

    server_name doomsday-clock.com www.doomsday-clock.com;

    return 301 https://doomsday-clock.com$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name www.doomsday-clock.com;

    ssl_certificate /etc/letsencrypt/live/www.doomsday-clock.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.doomsday-clock.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://doomsday-clock.com$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name doomsday-clock.com;

    root /var/www/doomsday-clock/public;
    index index.php index.html;

    charset utf-8;
    client_max_body_size 50M;

    access_log /var/log/nginx/doomsday-clock-access.log;
    error_log /var/log/nginx/doomsday-clock-error.log;

    ssl_certificate /etc/letsencrypt/live/www.doomsday-clock.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.doomsday-clock.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
    }

    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    location = /robots.txt {
        access_log off;
        log_not_found off;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
